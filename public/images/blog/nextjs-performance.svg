<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="nextBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nextAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0099ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#nextBg)"/>
  <circle cx="350" cy="50" r="60" fill="rgba(0,212,255,0.1)"/>
  <circle cx="80" cy="280" r="70" fill="rgba(0,212,255,0.08)"/>
  
  <!-- Performance graph -->
  <g transform="translate(60, 80)">
    <rect x="0" y="0" width="280" height="140" rx="8" fill="rgba(255,255,255,0.05)" stroke="rgba(0,212,255,0.3)" stroke-width="1"/>
    
    <!-- Grid lines -->
    <line x1="0" y1="35" x2="280" y2="35" stroke="rgba(0,212,255,0.1)" stroke-width="1"/>
    <line x1="0" y1="70" x2="280" y2="70" stroke="rgba(0,212,255,0.1)" stroke-width="1"/>
    <line x1="0" y1="105" x2="280" y2="105" stroke="rgba(0,212,255,0.1)" stroke-width="1"/>
    
    <!-- Performance bars -->
    <rect x="30" y="90" width="30" height="50" rx="4" fill="url(#nextAccent)" opacity="0.7"/>
    <rect x="80" y="60" width="30" height="80" rx="4" fill="url(#nextAccent)" opacity="0.8"/>
    <rect x="130" y="30" width="30" height="110" rx="4" fill="url(#nextAccent)" opacity="0.9"/>
    <rect x="180" y="50" width="30" height="90" rx="4" fill="url(#nextAccent)" opacity="0.8"/>
    
    <!-- Trend line -->
    <polyline points="45,90 95,60 145,30 195,50" fill="none" stroke="#00ff88" stroke-width="2" stroke-linecap="round"/>
  </g>
  
  <text x="200" y="260" font-size="16" font-weight="bold" text-anchor="middle" fill="#00d4ff">Lightning Fast Performance</text>
</svg>