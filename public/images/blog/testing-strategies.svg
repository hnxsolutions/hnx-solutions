<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="testBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6d28d9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="testAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c4b5fd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#testBg)"/>
  <circle cx="100" cy="80" r="70" fill="rgba(196,181,253,0.1)"/>
  <circle cx="330" cy="260" r="65" fill="rgba(196,181,253,0.08)"/>
  
  <!-- Test pyramid -->
  <g transform="translate(80, 50)">
    <!-- E2E Tests (top) -->
    <path d="M 70 20 L 100 60 L 40 60 Z" fill="url(#testAccent)" opacity="0.9" stroke="white" stroke-width="1.5"/>
    <text x="70" y="48" font-size="10" text-anchor="middle" fill="white" font-weight="bold">E2E</text>
    
    <!-- Integration Tests (middle) -->
    <rect x="30" y="60" width="80" height="45" fill="rgba(196,181,253,0.7)" stroke="white" stroke-width="1.5"/>
    <text x="70" y="87" font-size="10" text-anchor="middle" fill="white" font-weight="bold">Integration</text>
    
    <!-- Unit Tests (bottom) -->
    <rect x="0" y="105" width="140" height="55" rx="2" fill="rgba(196,181,253,0.5)" stroke="white" stroke-width="1.5"/>
    <text x="70" y="137" font-size="10" text-anchor="middle" fill="white" font-weight="bold">Unit Tests</text>
  </g>
  
  <!-- Quality indicators -->
  <g transform="translate(50, 200)">
    <rect x="0" y="0" width="300" height="70" rx="8" fill="rgba(255,255,255,0.08)" stroke="rgba(196,181,253,0.4)" stroke-width="2"/>
    
    <text x="20" y="25" font-size="12" fill="#c4b5fd" font-weight="bold">✓ Coverage</text>
    <text x="20" y="50" font-size="12" fill="#c4b5fd" font-weight="bold">✓ Reliability</text>
    
    <text x="160" y="25" font-size="12" fill="#c4b5fd" font-weight="bold">✓ Confidence</text>
    <text x="160" y="50" font-size="12" fill="#c4b5fd" font-weight="bold">✓ Documentation</text>
  </g>
</svg>