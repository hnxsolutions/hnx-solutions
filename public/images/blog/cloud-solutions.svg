<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cloudBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cloudAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#67e8f9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22d3ee;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#cloudBg)"/>
  <circle cx="75" cy="70" r="60" fill="rgba(103,232,249,0.1)"/>
  <circle cx="350" cy="260" r="70" fill="rgba(103,232,249,0.08)"/>
  
  <!-- Cloud infrastructure -->
  <g transform="translate(80, 80)">
    <!-- Central cloud -->
    <path d="M 50 30 Q 30 30 30 50 Q 30 70 50 70 L 130 70 Q 150 70 150 50 Q 150 30 130 30 Q 120 10 100 10 Q 80 10 70 20" fill="url(#cloudAccent)" stroke="white" stroke-width="2"/>
    <text x="90" y="50" font-size="12" font-weight="bold" text-anchor="middle" fill="#0891b2">Cloud</text>
  </g>
  
  <!-- Provider badges -->
  <g transform="translate(60, 170)">
    <!-- AWS -->
    <rect x="0" y="0" width="45" height="28" rx="3" fill="rgba(103,232,249,0.2)" stroke="rgba(103,232,249,0.5)" stroke-width="1"/>
    <text x="22.5" y="18" font-size="9" font-weight="bold" text-anchor="middle" fill="#67e8f9">AWS</text>
    
    <!-- GCP -->
    <rect x="55" y="0" width="45" height="28" rx="3" fill="rgba(103,232,249,0.2)" stroke="rgba(103,232,249,0.5)" stroke-width="1"/>
    <text x="77.5" y="18" font-size="9" font-weight="bold" text-anchor="middle" fill="#67e8f9">GCP</text>
    
    <!-- Azure -->
    <rect x="110" y="0" width="45" height="28" rx="3" fill="rgba(103,232,249,0.2)" stroke="rgba(103,232,249,0.5)" stroke-width="1"/>
    <text x="132.5" y="18" font-size="9" font-weight="bold" text-anchor="middle" fill="#67e8f9">Azure</text>
    
    <!-- K8s -->
    <rect x="165" y="0" width="45" height="28" rx="3" fill="rgba(103,232,249,0.2)" stroke="rgba(103,232,249,0.5)" stroke-width="1"/>
    <text x="187.5" y="18" font-size="9" font-weight="bold" text-anchor="middle" fill="#67e8f9">K8s</text>
  </g>
  
  <text x="200" y="270" font-size="16" font-weight="bold" text-anchor="middle" fill="#67e8f9">Cloud Solutions</text>
</svg>