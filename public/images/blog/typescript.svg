<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tsBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2b7a0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a4d0f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="tsAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ade80;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#tsBg)"/>
  <circle cx="100" cy="100" r="70" fill="rgba(74,222,128,0.1)"/>
  <circle cx="320" cy="240" r="60" fill="rgba(74,222,128,0.08)"/>
  
  <!-- Code blocks -->
  <g transform="translate(50, 60)">
    <rect x="0" y="0" width="300" height="180" rx="8" fill="rgba(0,0,0,0.4)" stroke="url(#tsAccent)" stroke-width="2"/>
    
    <!-- Code lines -->
    <text x="20" y="30" font-size="11" font-family="monospace" fill="#4ade80" font-weight="bold">interface</text>
    <text x="95" y="30" font-size="11" font-family="monospace" fill="#ffffff">User {</text>
    
    <text x="35" y="50" font-size="11" font-family="monospace" fill="#ffffff">id: </text>
    <text x="60" y="50" font-size="11" font-family="monospace" fill="#fbbf24">number</text>
    <text x="155" y="50" font-size="11" font-family="monospace" fill="#ffffff">;</text>
    
    <text x="35" y="70" font-size="11" font-family="monospace" fill="#ffffff">name: </text>
    <text x="85" y="70" font-size="11" font-family="monospace" fill="#fbbf24">string</text>
    <text x="155" y="70" font-size="11" font-family="monospace" fill="#ffffff">;</text>
    
    <text x="35" y="90" font-size="11" font-family="monospace" fill="#ffffff">email: </text>
    <text x="85" y="90" font-size="11" font-family="monospace" fill="#fbbf24">string</text>
    <text x="155" y="90" font-size="11" font-family="monospace" fill="#ffffff">;</text>
    
    <text x="20" y="110" font-size="11" font-family="monospace" fill="#ffffff">}</text>
    
    <line x1="20" y1="125" x2="280" y2="125" stroke="rgba(74,222,128,0.3)" stroke-width="1"/>
    
    <!-- Benefits -->
    <text x="20" y="150" font-size="12" fill="#4ade80" font-weight="bold">✓ Type Safety</text>
    <text x="20" y="170" font-size="12" fill="#4ade80" font-weight="bold">✓ Better IDE Support</text>
  </g>
  
  <text x="200" y="275" font-size="18" font-weight="bold" text-anchor="middle" fill="#4ade80">TypeScript Mastery</text>
</svg>