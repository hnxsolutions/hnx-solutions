<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="crmBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0369a1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="crmAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7dd3fc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38bdf8;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#crmBg)"/>
  <circle cx="60" cy="80" r="70" fill="rgba(125,211,252,0.1)"/>
  <circle cx="360" cy="250" r="65" fill="rgba(125,211,252,0.08)"/>
  
  <!-- Customer network diagram -->
  <g transform="translate(100, 70)">
    <!-- Central hub -->
    <circle cx="100" cy="60" r="12" fill="url(#crmAccent)" stroke="white" stroke-width="2"/>
    <text x="100" y="65" font-size="10" text-anchor="middle" fill="#0369a1" font-weight="bold">CRM</text>
    
    <!-- Connected points -->
    <circle cx="50" cy="30" r="8" fill="rgba(125,211,252,0.8)" stroke="white" stroke-width="1.5"/>
    <text x="50" y="55" font-size="9" text-anchor="middle" fill="#7dd3fc" font-weight="bold">Sales</text>
    
    <circle cx="150" cy="20" r="8" fill="rgba(125,211,252,0.8)" stroke="white" stroke-width="1.5"/>
    <text x="150" y="45" font-size="9" text-anchor="middle" fill="#7dd3fc" font-weight="bold">Service</text>
    
    <circle cx="50" cy="90" r="8" fill="rgba(125,211,252,0.8)" stroke="white" stroke-width="1.5"/>
    <text x="50" y="115" font-size="9" text-anchor="middle" fill="#7dd3fc" font-weight="bold">Marketing</text>
    
    <circle cx="150" cy="100" r="8" fill="rgba(125,211,252,0.8)" stroke="white" stroke-width="1.5"/>
    <text x="150" y="125" font-size="9" text-anchor="middle" fill="#7dd3fc" font-weight="bold">Analytics</text>
    
    <!-- Connection lines -->
    <line x1="88" y1="52" x2="54" y2="36" stroke="rgba(125,211,252,0.4)" stroke-width="1.5"/>
    <line x1="106" y1="50" x2="146" y2="28" stroke="rgba(125,211,252,0.4)" stroke-width="1.5"/>
    <line x1="88" y1="68" x2="54" y2="84" stroke="rgba(125,211,252,0.4)" stroke-width="1.5"/>
    <line x1="106" y1="70" x2="146" y2="92" stroke="rgba(125,211,252,0.4)" stroke-width="1.5"/>
  </g>
  
  <text x="200" y="265" font-size="16" font-weight="bold" text-anchor="middle" fill="#7dd3fc">Salesforce Integration</text>
</svg>