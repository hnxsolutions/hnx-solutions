<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="saasBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e3a8a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="saasAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#saasBg)"/>
  <circle cx="80" cy="100" r="65" fill="rgba(96,165,250,0.1)"/>
  <circle cx="340" cy="260" r="70" fill="rgba(96,165,250,0.08)"/>
  
  <!-- Growth chart -->
  <g transform="translate(60, 60)">
    <rect x="0" y="0" width="280" height="150" rx="8" fill="rgba(255,255,255,0.05)" stroke="rgba(96,165,250,0.3)" stroke-width="2"/>
    
    <!-- Grid -->
    <line x1="0" y1="40" x2="280" y2="40" stroke="rgba(96,165,250,0.1)" stroke-width="1"/>
    <line x1="0" y1="80" x2="280" y2="80" stroke="rgba(96,165,250,0.1)" stroke-width="1"/>
    <line x1="0" y1="120" x2="280" y2="120" stroke="rgba(96,165,250,0.1)" stroke-width="1"/>
    
    <!-- Growth line -->
    <polyline points="20,110 70,75 120,45 170,25 220,20 270,15" fill="none" stroke="url(#saasAccent)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Data points -->
    <circle cx="20" cy="110" r="3" fill="url(#saasAccent)"/>
    <circle cx="70" cy="75" r="3" fill="url(#saasAccent)"/>
    <circle cx="120" cy="45" r="3" fill="url(#saasAccent)"/>
    <circle cx="170" cy="25" r="3" fill="url(#saasAccent)"/>
    <circle cx="220" cy="20" r="3" fill="url(#saasAccent)"/>
    <circle cx="270" cy="15" r="3" fill="url(#saasAccent)"/>
    
    <!-- Axis labels -->
    <text x="10" y="140" font-size="8" fill="rgba(96,165,250,0.6)" text-anchor="middle">Q1</text>
    <text x="60" y="140" font-size="8" fill="rgba(96,165,250,0.6)" text-anchor="middle">Q2</text>
    <text x="110" y="140" font-size="8" fill="rgba(96,165,250,0.6)" text-anchor="middle">Q3</text>
    <text x="160" y="140" font-size="8" fill="rgba(96,165,250,0.6)" text-anchor="middle">Q4</text>
  </g>
  
  <text x="200" y="260" font-size="16" font-weight="bold" text-anchor="middle" fill="#60a5fa">Scale Your SaaS</text>
</svg>