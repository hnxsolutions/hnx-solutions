<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mobileBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ea580c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="mobileAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fed7aa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fbca48;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#mobileBg)"/>
  <circle cx="80" cy="70" r="60" fill="rgba(254,215,170,0.1)"/>
  <circle cx="350" cy="270" r="75" fill="rgba(254,215,170,0.08)"/>
  
  <!-- Three smartphones -->
  <g transform="translate(70, 60)">
    <!-- Left phone -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="50" height="80" rx="4" fill="rgba(0,0,0,0.8)" stroke="rgba(254,215,170,0.6)" stroke-width="2"/>
      <rect x="3" y="3" width="44" height="70" rx="2" fill="#1a1a1a"/>
      <circle cx="25" cy="77" r="2" fill="white" opacity="0.6"/>
      <!-- Screen content -->
      <rect x="5" y="8" width="40" height="20" rx="2" fill="url(#mobileAccent)" opacity="0.7"/>
      <line x1="7" y1="33" x2="43" y2="33" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
      <line x1="7" y1="40" x2="43" y2="40" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    </g>
    
    <!-- Center phone (larger) -->
    <g transform="translate(60, -10)">
      <rect x="0" y="0" width="55" height="90" rx="5" fill="rgba(0,0,0,0.9)" stroke="url(#mobileAccent)" stroke-width="2.5"/>
      <rect x="3" y="3" width="49" height="80" rx="3" fill="#1a1a1a"/>
      <circle cx="27.5" cy="87" r="2.5" fill="white" opacity="0.7"/>
      <!-- Screen content -->
      <rect x="6" y="8" width="43" height="25" rx="2" fill="url(#mobileAccent)" opacity="0.8"/>
      <line x1="8" y1="38" x2="45" y2="38" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
      <line x1="8" y1="46" x2="45" y2="46" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
      <line x1="8" y1="54" x2="40" y2="54" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    </g>
    
    <!-- Right phone -->
    <g transform="translate(125, 5)">
      <rect x="0" y="0" width="50" height="80" rx="4" fill="rgba(0,0,0,0.8)" stroke="rgba(254,215,170,0.6)" stroke-width="2"/>
      <rect x="3" y="3" width="44" height="70" rx="2" fill="#1a1a1a"/>
      <circle cx="25" cy="77" r="2" fill="white" opacity="0.6"/>
      <!-- Screen content -->
      <rect x="5" y="8" width="40" height="20" rx="2" fill="url(#mobileAccent)" opacity="0.7"/>
      <line x1="7" y1="33" x2="43" y2="33" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
      <line x1="7" y1="40" x2="43" y2="40" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    </g>
  </g>
  
  <text x="200" y="260" font-size="16" font-weight="bold" text-anchor="middle" fill="#fed7aa">Cross-Platform Apps</text>
</svg>