<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="webDevBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="webDevAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#webDevBg)"/>
  <circle cx="100" cy="80" r="60" fill="rgba(255,255,255,0.1)"/>
  <circle cx="350" cy="250" r="80" fill="rgba(255,255,255,0.05)"/>
  
  <g transform="translate(50, 70)">
    <rect x="0" y="0" width="300" height="160" rx="12" fill="rgba(255,255,255,0.95)" filter="drop-shadow(0 10px 30px rgba(0,0,0,0.2))"/>
    
    <!-- Browser chrome -->
    <rect x="0" y="0" width="300" height="30" rx="12" fill="#f0f0f0"/>
    <circle cx="15" cy="15" r="3" fill="#ff5f56"/>
    <circle cx="32" cy="15" r="3" fill="#ffbd2e"/>
    <circle cx="49" cy="15" r="3" fill="#27c93f"/>
    
    <!-- URL bar -->
    <rect x="70" y="8" width="220" height="14" rx="7" fill="#e8e8e8"/>
    <text x="80" y="17" font-size="9" fill="#999" font-family="monospace">www.yoursite.com</text>
    
    <!-- Content representation -->
    <rect x="20" y="50" width="260" height="15" rx="2" fill="url(#webDevAccent)" opacity="0.8"/>
    <rect x="20" y="75" width="200" height="8" rx="1" fill="#ddd"/>
    <rect x="20" y="88" width="260" height="8" rx="1" fill="#ddd"/>
    <rect x="20" y="101" width="240" height="8" rx="1" fill="#ddd"/>
    <rect x="20" y="114" width="180" height="8" rx="1" fill="#ddd"/>
  </g>
  
  <text x="200" y="265" font-size="18" font-weight="bold" text-anchor="middle" fill="white">Web Development</text>
</svg>