<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="uiBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e91e63;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c2185b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="uiAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f48fb1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f06292;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#uiBg)"/>
  <circle cx="80" cy="60" r="65" fill="rgba(244,143,177,0.1)"/>
  <circle cx="340" cy="270" r="70" fill="rgba(244,143,177,0.08)"/>
  
  <!-- Three design frames -->
  <g transform="translate(50, 60)">
    <!-- Frame 1 -->
    <rect x="0" y="0" width="50" height="70" rx="3" fill="rgba(255,255,255,0.1)" stroke="url(#uiAccent)" stroke-width="2"/>
    <rect x="4" y="4" width="42" height="14" fill="url(#uiAccent)" opacity="0.6"/>
    <line x1="6" y1="24" x2="46" y2="24" stroke="rgba(244,143,177,0.5)" stroke-width="1"/>
    <line x1="6" y1="31" x2="46" y2="31" stroke="rgba(244,143,177,0.4)" stroke-width="1"/>
    <line x1="6" y1="38" x2="38" y2="38" stroke="rgba(244,143,177,0.4)" stroke-width="1"/>
    <circle cx="25" cy="55" r="5" fill="url(#uiAccent)" opacity="0.7"/>
    
    <!-- Frame 2 -->
    <rect x="65" y="0" width="50" height="70" rx="3" fill="rgba(255,255,255,0.1)" stroke="url(#uiAccent)" stroke-width="2"/>
    <circle cx="90" cy="12" r="6" fill="url(#uiAccent)" opacity="0.6"/>
    <rect x="69" y="24" width="22" height="38" rx="2" fill="rgba(244,143,177,0.3)" stroke="rgba(244,143,177,0.6)" stroke-width="1"/>
    <rect x="95" y="24" width="14" height="38" rx="2" fill="rgba(244,143,177,0.3)" stroke="rgba(244,143,177,0.6)" stroke-width="1"/>
    
    <!-- Frame 3 -->
    <rect x="130" y="0" width="50" height="70" rx="3" fill="rgba(255,255,255,0.1)" stroke="url(#uiAccent)" stroke-width="2"/>
    <line x1="135" y1="12" x2="175" y2="12" stroke="url(#uiAccent)" stroke-width="2" opacity="0.7"/>
    <circle cx="140" cy="28" r="4" fill="url(#uiAccent)" opacity="0.6"/>
    <rect x="150" y="24" width="20" height="8" fill="url(#uiAccent)" opacity="0.6"/>
    <line x1="135" y1="42" x2="175" y2="42" stroke="rgba(244,143,177,0.5)" stroke-width="1.5"/>
    <line x1="135" y1="52" x2="170" y2="52" stroke="rgba(244,143,177,0.5)" stroke-width="1"/>
  </g>
  
  <text x="200" y="270" font-size="16" font-weight="bold" text-anchor="middle" fill="#f48fb1">UI/UX Design</text>
</svg>