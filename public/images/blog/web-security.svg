<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="secBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b91c1c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="secAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fca5a5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f87171;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#secBg)"/>
  <circle cx="50" cy="200" r="80" fill="rgba(252,165,165,0.1)"/>
  <circle cx="380" cy="80" r="60" fill="rgba(252,165,165,0.08)"/>
  
  <!-- Shield and lock icon -->
  <g transform="translate(140, 70)">
    <!-- Shield -->
    <path d="M 60 20 L 100 40 L 100 100 Q 60 130 60 130 Q 20 100 20 40 Z" fill="url(#secAccent)" stroke="white" stroke-width="2"/>
    
    <!-- Lock in center -->
    <rect x="45" y="65" width="30" height="35" rx="4" fill="rgba(255,255,255,0.9)"/>
    <path d="M 50 65 Q 50 55 60 55 Q 70 55 70 65" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="2" stroke-linecap="round"/>
    <circle cx="60" cy="85" r="2.5" fill="#dc2626"/>
  </g>
  
  <!-- Security benefits -->
  <g transform="translate(50, 190)">
    <rect x="0" y="0" width="300" height="80" rx="8" fill="rgba(255,255,255,0.1)" stroke="rgba(252,165,165,0.3)" stroke-width="2"/>
    
    <text x="20" y="25" font-size="12" fill="#fca5a5" font-weight="bold">🔐 Encryption</text>
    <text x="20" y="45" font-size="12" fill="#fca5a5" font-weight="bold">🛡️ Authentication</text>
    <text x="20" y="65" font-size="12" fill="#fca5a5" font-weight="bold">🔒 Data Protection</text>
    
    <text x="200" y="25" font-size="12" fill="#fca5a5" font-weight="bold">✓ Compliance</text>
    <text x="200" y="45" font-size="12" fill="#fca5a5" font-weight="bold">✓ Secure Headers</text>
    <text x="200" y="65" font-size="12" fill="#fca5a5" font-weight="bold">✓ Threat Prevention</text>
  </g>
</svg>