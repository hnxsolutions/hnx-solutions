<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="growthBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="growthAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#86efac;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4ade80;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#growthBg)"/>
  <circle cx="70" cy="60" r="65" fill="rgba(134,239,172,0.1)"/>
  <circle cx="340" cy="270" r="70" fill="rgba(134,239,172,0.08)"/>
  
  <!-- Growth chart -->
  <g transform="translate(60, 70)">
    <!-- Grid -->
    <line x1="30" y1="0" x2="30" y2="100" stroke="rgba(134,239,172,0.2)" stroke-width="1"/>
    <line x1="0" y1="100" x2="200" y2="100" stroke="rgba(134,239,172,0.2)" stroke-width="1.5"/>
    
    <!-- Bar chart -->
    <rect x="40" y="80" width="20" height="20" fill="url(#growthAccent)" opacity="0.8"/>
    <rect x="70" y="60" width="20" height="40" fill="url(#growthAccent)" opacity="0.8"/>
    <rect x="100" y="40" width="20" height="60" fill="url(#growthAccent)" opacity="0.8"/>
    <rect x="130" y="20" width="20" height="80" fill="url(#growthAccent)" opacity="0.8"/>
    
    <!-- Growth line -->
    <polyline points="50,80 80,60 110,40 140,20" fill="none" stroke="#86efac" stroke-width="2.5"/>
    <circle cx="50" cy="80" r="3" fill="#86efac"/>
    <circle cx="80" cy="60" r="3" fill="#86efac"/>
    <circle cx="110" cy="40" r="3" fill="#86efac"/>
    <circle cx="140" cy="20" r="3" fill="#86efac"/>
    
    <!-- Axis labels -->
    <text x="45" y="115" font-size="8" text-anchor="middle" fill="rgba(134,239,172,0.7)">Q1</text>
    <text x="80" y="115" font-size="8" text-anchor="middle" fill="rgba(134,239,172,0.7)">Q2</text>
    <text x="110" y="115" font-size="8" text-anchor="middle" fill="rgba(134,239,172,0.7)">Q3</text>
    <text x="140" y="115" font-size="8" text-anchor="middle" fill="rgba(134,239,172,0.7)">Q4</text>
  </g>
  
  <!-- Metrics -->
  <g transform="translate(80, 180)">
    <rect x="0" y="0" width="75" height="25" rx="2" fill="rgba(134,239,172,0.15)" stroke="rgba(134,239,172,0.4)" stroke-width="1"/>
    <text x="37.5" y="16" font-size="10" font-weight="bold" text-anchor="middle" fill="#86efac">+250%</text>
    
    <rect x="85" y="0" width="75" height="25" rx="2" fill="rgba(134,239,172,0.15)" stroke="rgba(134,239,172,0.4)" stroke-width="1"/>
    <text x="122.5" y="16" font-size="10" font-weight="bold" text-anchor="middle" fill="#86efac">Growth</text>
  </g>
  
  <text x="200" y="270" font-size="16" font-weight="bold" text-anchor="middle" fill="#86efac">Digital Growth</text>
</svg>