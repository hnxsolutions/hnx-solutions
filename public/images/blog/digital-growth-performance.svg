<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="dgBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b45309;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dgAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fde68a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fcd34d;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#dgBg)"/>
  <circle cx="70" cy="60" r="65" fill="rgba(253,230,138,0.1)"/>
  <circle cx="340" cy="270" r="70" fill="rgba(253,230,138,0.08)"/>

  <!-- Upward arrow / rocket shape -->
  <g transform="translate(55, 55)">
    <polygon points="40,65 20,35 30,35 30,5 50,5 50,35 60,35" fill="rgba(253,230,138,0.3)" stroke="rgba(253,230,138,0.6)" stroke-width="1.5"/>
    <circle cx="40" cy="75" r="6" fill="rgba(253,230,138,0.4)"/>
    <circle cx="40" cy="88" r="4" fill="rgba(253,230,138,0.25)"/>
  </g>

  <!-- KPI metric cards -->
  <g transform="translate(130, 50)">
    <rect x="0" y="0" width="80" height="42" rx="4" fill="rgba(253,230,138,0.15)" stroke="rgba(253,230,138,0.4)" stroke-width="1"/>
    <text x="40" y="16" font-size="8" text-anchor="middle" fill="rgba(253,230,138,0.7)">Organic Traffic</text>
    <text x="40" y="32" font-size="14" font-weight="bold" text-anchor="middle" fill="#fde68a">+320%</text>

    <rect x="90" y="0" width="80" height="42" rx="4" fill="rgba(253,230,138,0.15)" stroke="rgba(253,230,138,0.4)" stroke-width="1"/>
    <text x="130" y="16" font-size="8" text-anchor="middle" fill="rgba(253,230,138,0.7)">Conversions</text>
    <text x="130" y="32" font-size="14" font-weight="bold" text-anchor="middle" fill="#fde68a">+145%</text>

    <rect x="0" y="52" width="80" height="42" rx="4" fill="rgba(253,230,138,0.15)" stroke="rgba(253,230,138,0.4)" stroke-width="1"/>
    <text x="40" y="68" font-size="8" text-anchor="middle" fill="rgba(253,230,138,0.7)">Bounce Rate</text>
    <text x="40" y="84" font-size="14" font-weight="bold" text-anchor="middle" fill="#fde68a">-38%</text>

    <rect x="90" y="52" width="80" height="42" rx="4" fill="rgba(253,230,138,0.15)" stroke="rgba(253,230,138,0.4)" stroke-width="1"/>
    <text x="130" y="68" font-size="8" text-anchor="middle" fill="rgba(253,230,138,0.7)">Avg. Position</text>
    <text x="130" y="84" font-size="14" font-weight="bold" text-anchor="middle" fill="#fde68a">#2.4</text>
  </g>

  <!-- Performance trend line -->
  <g transform="translate(55, 175)">
    <line x1="25" y1="0" x2="25" y2="85" stroke="rgba(253,230,138,0.2)" stroke-width="1"/>
    <line x1="0" y1="85" x2="320" y2="85" stroke="rgba(253,230,138,0.2)" stroke-width="1.5"/>
    <!-- Filled area under curve -->
    <polygon points="35,75 85,55 135,35 185,20 235,10 285,5 285,85 35,85" fill="rgba(253,230,138,0.12)"/>
    <polyline points="35,75 85,55 135,35 185,20 235,10 285,5" fill="none" stroke="#fde68a" stroke-width="2.5"/>
    <circle cx="35" cy="75" r="3.5" fill="#fde68a"/>
    <circle cx="85" cy="55" r="3.5" fill="#fde68a"/>
    <circle cx="135" cy="35" r="3.5" fill="#fde68a"/>
    <circle cx="185" cy="20" r="3.5" fill="#fde68a"/>
    <circle cx="235" cy="10" r="3.5" fill="#fde68a"/>
    <circle cx="285" cy="5" r="3.5" fill="#fde68a"/>
    <text x="35" y="100" font-size="7" text-anchor="middle" fill="rgba(253,230,138,0.6)">Jan</text>
    <text x="85" y="100" font-size="7" text-anchor="middle" fill="rgba(253,230,138,0.6)">Feb</text>
    <text x="135" y="100" font-size="7" text-anchor="middle" fill="rgba(253,230,138,0.6)">Mar</text>
    <text x="185" y="100" font-size="7" text-anchor="middle" fill="rgba(253,230,138,0.6)">Apr</text>
    <text x="235" y="100" font-size="7" text-anchor="middle" fill="rgba(253,230,138,0.6)">May</text>
    <text x="285" y="100" font-size="7" text-anchor="middle" fill="rgba(253,230,138,0.6)">Jun</text>
  </g>

  <text x="200" y="272" font-size="15" font-weight="bold" text-anchor="middle" fill="#fde68a">Digital Growth</text>
</svg>
