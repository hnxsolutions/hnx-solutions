<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="seoBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="seoAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#93c5fd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#seoBg)"/>
  <circle cx="70" cy="60" r="65" fill="rgba(147,197,253,0.1)"/>
  <circle cx="340" cy="270" r="70" fill="rgba(147,197,253,0.08)"/>

  <!-- Magnifying glass / SEO search icon -->
  <g transform="translate(55, 55)">
    <circle cx="40" cy="40" r="28" fill="none" stroke="rgba(147,197,253,0.5)" stroke-width="5"/>
    <line x1="60" y1="60" x2="78" y2="78" stroke="rgba(147,197,253,0.5)" stroke-width="5" stroke-linecap="round"/>
    <!-- inner circle highlight -->
    <circle cx="33" cy="33" r="10" fill="rgba(147,197,253,0.15)"/>
  </g>

  <!-- Core Web Vitals bars -->
  <g transform="translate(170, 60)">
    <text x="70" y="12" font-size="9" font-weight="bold" text-anchor="middle" fill="rgba(147,197,253,0.8)">Core Web Vitals</text>
    <!-- LCP -->
    <rect x="0" y="22" width="140" height="13" rx="2" fill="rgba(147,197,253,0.1)" stroke="rgba(147,197,253,0.2)" stroke-width="1"/>
    <rect x="0" y="22" width="105" height="13" rx="2" fill="url(#seoAccent)" opacity="0.7"/>
    <text x="145" y="33" font-size="8" fill="rgba(147,197,253,0.8)">LCP</text>

    <!-- FID -->
    <rect x="0" y="42" width="140" height="13" rx="2" fill="rgba(147,197,253,0.1)" stroke="rgba(147,197,253,0.2)" stroke-width="1"/>
    <rect x="0" y="42" width="120" height="13" rx="2" fill="url(#seoAccent)" opacity="0.7"/>
    <text x="145" y="53" font-size="8" fill="rgba(147,197,253,0.8)">FID</text>

    <!-- CLS -->
    <rect x="0" y="62" width="140" height="13" rx="2" fill="rgba(147,197,253,0.1)" stroke="rgba(147,197,253,0.2)" stroke-width="1"/>
    <rect x="0" y="62" width="90" height="13" rx="2" fill="url(#seoAccent)" opacity="0.7"/>
    <text x="145" y="73" font-size="8" fill="rgba(147,197,253,0.8)">CLS</text>
  </g>

  <!-- Ranking chart -->
  <g transform="translate(60, 165)">
    <line x1="30" y1="0" x2="30" y2="80" stroke="rgba(147,197,253,0.2)" stroke-width="1"/>
    <line x1="0" y1="80" x2="200" y2="80" stroke="rgba(147,197,253,0.2)" stroke-width="1.5"/>
    <rect x="40" y="65" width="20" height="15" fill="url(#seoAccent)" opacity="0.7"/>
    <rect x="70" y="48" width="20" height="32" fill="url(#seoAccent)" opacity="0.7"/>
    <rect x="100" y="28" width="20" height="52" fill="url(#seoAccent)" opacity="0.7"/>
    <rect x="130" y="10" width="20" height="70" fill="url(#seoAccent)" opacity="0.7"/>
    <polyline points="50,65 80,48 110,28 140,10" fill="none" stroke="#93c5fd" stroke-width="2.5"/>
    <circle cx="50" cy="65" r="3" fill="#93c5fd"/>
    <circle cx="80" cy="48" r="3" fill="#93c5fd"/>
    <circle cx="110" cy="28" r="3" fill="#93c5fd"/>
    <circle cx="140" cy="10" r="3" fill="#93c5fd"/>
    <text x="50" y="95" font-size="7" text-anchor="middle" fill="rgba(147,197,253,0.6)">Wk1</text>
    <text x="80" y="95" font-size="7" text-anchor="middle" fill="rgba(147,197,253,0.6)">Wk2</text>
    <text x="110" y="95" font-size="7" text-anchor="middle" fill="rgba(147,197,253,0.6)">Wk3</text>
    <text x="140" y="95" font-size="7" text-anchor="middle" fill="rgba(147,197,253,0.6)">Wk4</text>
  </g>

  <!-- Badges -->
  <g transform="translate(295, 170)">
    <rect x="0" y="0" width="75" height="25" rx="2" fill="rgba(147,197,253,0.15)" stroke="rgba(147,197,253,0.4)" stroke-width="1"/>
    <text x="37.5" y="16" font-size="10" font-weight="bold" text-anchor="middle" fill="#93c5fd">Rank #1</text>
    <rect x="0" y="32" width="75" height="25" rx="2" fill="rgba(147,197,253,0.15)" stroke="rgba(147,197,253,0.4)" stroke-width="1"/>
    <text x="37.5" y="48" font-size="10" font-weight="bold" text-anchor="middle" fill="#93c5fd">+180%</text>
  </g>

  <text x="200" y="272" font-size="15" font-weight="bold" text-anchor="middle" fill="#93c5fd">Technical SEO</text>
</svg>
