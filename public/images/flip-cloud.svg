<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0f0c29"/><stop offset="50%" stop-color="#302b63"/><stop offset="100%" stop-color="#24243e"/></linearGradient>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#00d2ff"/><stop offset="100%" stop-color="#3a7bd5"/></linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f857a6"/><stop offset="100%" stop-color="#ff5858"/></linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#a18cd1"/><stop offset="100%" stop-color="#fbc2eb"/></linearGradient>
    <linearGradient id="g4" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#43e97b"/><stop offset="100%" stop-color="#38f9d7"/></linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glow2"><feGaussianBlur stdDeviation="22" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="600" height="600" fill="url(#sky)"/>
  <!-- Ambient orbs -->
  <circle cx="200" cy="200" r="180" fill="#00d2ff" opacity="0.08" filter="url(#glow2)"/>
  <circle cx="450" cy="420" r="160" fill="#f857a6" opacity="0.07" filter="url(#glow2)"/>
  <circle cx="300" cy="500" r="120" fill="#43e97b" opacity="0.05" filter="url(#glow2)"/>
  <!-- Cloud body -->
  <g filter="url(#glow)">
    <ellipse cx="300" cy="230" rx="140" ry="70" fill="url(#g1)" opacity="0.3"/>
    <ellipse cx="220" cy="220" rx="85" ry="65" fill="#00d2ff" opacity="0.2"/>
    <ellipse cx="380" cy="225" rx="80" ry="58" fill="#3a7bd5" opacity="0.22"/>
    <ellipse cx="300" cy="190" rx="75" ry="50" fill="#00d2ff" opacity="0.18"/>
  </g>
  <!-- Server towers -->
  <g opacity="0.9">
    <rect x="225" y="200" width="38" height="65" rx="6" fill="url(#g1)" opacity="0.55"/>
    <rect x="231" y="210" width="26" height="5" rx="2" fill="#fff" opacity="0.55"/>
    <rect x="231" y="221" width="26" height="5" rx="2" fill="#fff" opacity="0.45"/>
    <rect x="231" y="232" width="26" height="5" rx="2" fill="#fff" opacity="0.35"/>
    <circle cx="252" cy="253" r="3.5" fill="#43e97b" opacity="0.95"/>
    <rect x="280" y="190" width="38" height="75" rx="6" fill="url(#g3)" opacity="0.55"/>
    <rect x="286" y="200" width="26" height="5" rx="2" fill="#fff" opacity="0.55"/>
    <rect x="286" y="211" width="26" height="5" rx="2" fill="#fff" opacity="0.45"/>
    <rect x="286" y="222" width="26" height="5" rx="2" fill="#fff" opacity="0.35"/>
    <circle cx="307" cy="253" r="3.5" fill="#f857a6" opacity="0.95"/>
    <rect x="335" y="205" width="38" height="60" rx="6" fill="url(#g2)" opacity="0.5"/>
    <rect x="341" y="215" width="26" height="5" rx="2" fill="#fff" opacity="0.55"/>
    <rect x="341" y="226" width="26" height="5" rx="2" fill="#fff" opacity="0.45"/>
    <circle cx="362" cy="253" r="3.5" fill="#00d2ff" opacity="0.95"/>
  </g>
  <!-- Connection lines -->
  <g stroke-width="2" fill="none" opacity="0.45">
    <line x1="245" y1="275" x2="120" y2="385" stroke="url(#g1)"/>
    <line x1="300" y1="285" x2="300" y2="405" stroke="url(#g3)"/>
    <line x1="355" y1="275" x2="480" y2="385" stroke="url(#g2)"/>
    <line x1="230" y1="280" x2="175" y2="430" stroke="url(#g4)"/>
    <line x1="370" y1="280" x2="425" y2="430" stroke="url(#g4)"/>
  </g>
  <!-- Colourful endpoint nodes -->
  <circle cx="120" cy="390" r="22" fill="url(#g1)" opacity="0.65" filter="url(#glow)"/>
  <circle cx="120" cy="390" r="10" fill="#fff" opacity="0.5"/>
  <circle cx="300" cy="410" r="24" fill="url(#g3)" opacity="0.65" filter="url(#glow)"/>
  <circle cx="300" cy="410" r="11" fill="#fff" opacity="0.5"/>
  <circle cx="480" cy="390" r="22" fill="url(#g2)" opacity="0.65" filter="url(#glow)"/>
  <circle cx="480" cy="390" r="10" fill="#fff" opacity="0.5"/>
  <circle cx="175" cy="435" r="17" fill="url(#g4)" opacity="0.55" filter="url(#glow)"/>
  <circle cx="175" cy="435" r="8" fill="#fff" opacity="0.4"/>
  <circle cx="425" cy="435" r="17" fill="url(#g4)" opacity="0.55" filter="url(#glow)"/>
  <circle cx="425" cy="435" r="8" fill="#fff" opacity="0.4"/>
  <!-- Orbiting rings -->
  <ellipse cx="300" cy="235" rx="210" ry="42" stroke="url(#g1)" stroke-width="1.2" fill="none" opacity="0.15" transform="rotate(-8,300,235)"/>
  <ellipse cx="300" cy="235" rx="230" ry="52" stroke="url(#g2)" stroke-width="0.8" fill="none" opacity="0.1" transform="rotate(10,300,235)"/>
  <!-- Data packets -->
  <circle cx="100" cy="255" r="6" fill="#00d2ff" opacity="0.9" filter="url(#glow)"/>
  <circle cx="510" cy="220" r="6" fill="#f857a6" opacity="0.8" filter="url(#glow)"/>
  <circle cx="300" cy="135" r="4" fill="#a18cd1" opacity="0.7" filter="url(#glow)"/>
  <!-- Stars -->
  <circle cx="75" cy="75" r="2.5" fill="#fbc2eb" opacity="0.7"/>
  <circle cx="525" cy="55" r="3" fill="#00d2ff" opacity="0.6"/>
  <circle cx="45" cy="350" r="2" fill="#43e97b" opacity="0.5"/>
  <circle cx="555" cy="310" r="2.5" fill="#ff5858" opacity="0.5"/>
  <circle cx="150" cy="110" r="1.5" fill="#fff" opacity="0.4"/>
  <circle cx="460" cy="120" r="1.5" fill="#fff" opacity="0.4"/>
  <circle cx="300" cy="70" r="2" fill="#a18cd1" opacity="0.6"/>
  <circle cx="560" cy="540" r="2" fill="#fbc2eb" opacity="0.4"/>
  <circle cx="40" cy="530" r="2" fill="#38f9d7" opacity="0.4"/>
  <!-- Bottom glow -->
  <rect x="80" y="530" width="440" height="5" rx="2.5" fill="url(#g1)" opacity="0.18" filter="url(#glow)"/>
</svg>
