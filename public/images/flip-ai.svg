<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1a0a00"/><stop offset="50%" stop-color="#2d1506"/><stop offset="100%" stop-color="#0d0500"/></linearGradient>
    <linearGradient id="a1" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f59e0b"/><stop offset="100%" stop-color="#ef4444"/></linearGradient>
    <linearGradient id="a2" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#06b6d4"/><stop offset="100%" stop-color="#8b5cf6"/></linearGradient>
    <linearGradient id="a3" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#10b981"/><stop offset="100%" stop-color="#06b6d4"/></linearGradient>
    <linearGradient id="a4" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ec4899"/><stop offset="100%" stop-color="#f43f5e"/></linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glow2"><feGaussianBlur stdDeviation="22" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glow3"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="600" height="600" fill="url(#bg)"/>
  <!-- Ambient orbs -->
  <circle cx="300" cy="260" r="220" fill="#f59e0b" opacity="0.07" filter="url(#glow2)"/>
  <circle cx="150" cy="420" r="140" fill="#ec4899" opacity="0.05" filter="url(#glow2)"/>
  <circle cx="480" cy="150" r="130" fill="#06b6d4" opacity="0.05" filter="url(#glow2)"/>
  <!-- Brain outline -->
  <g transform="translate(300,240)" opacity="0.9">
    <!-- Left hemisphere -->
    <path d="M-12,0 C-12,-90 -100,-115 -100,-35 C-100,12 -78,35 -55,48 C-78,65 -95,88 -78,110 C-60,128 -33,115 -12,98" stroke="url(#a1)" stroke-width="2.5" fill="none" opacity="0.6"/>
    <!-- Right hemisphere -->
    <path d="M12,0 C12,-90 100,-115 100,-35 C100,12 78,35 55,48 C78,65 95,88 78,110 C60,128 33,115 12,98" stroke="url(#a1)" stroke-width="2.5" fill="none" opacity="0.6"/>
    <!-- Folds left -->
    <path d="M-12,-45 C-40,-40 -62,-32 -82,-15" stroke="#f59e0b" stroke-width="1.5" fill="none" opacity="0.35"/>
    <path d="M-12,-10 C-34,-5 -60,8 -78,25" stroke="#ef4444" stroke-width="1.5" fill="none" opacity="0.3"/>
    <path d="M-12,30 C-28,38 -50,50 -60,60" stroke="#f59e0b" stroke-width="1.2" fill="none" opacity="0.25"/>
    <!-- Folds right -->
    <path d="M12,-45 C40,-40 62,-32 82,-15" stroke="#f59e0b" stroke-width="1.5" fill="none" opacity="0.35"/>
    <path d="M12,-10 C34,-5 60,8 78,25" stroke="#ef4444" stroke-width="1.5" fill="none" opacity="0.3"/>
    <path d="M12,30 C28,38 50,50 60,60" stroke="#f59e0b" stroke-width="1.2" fill="none" opacity="0.25"/>
  </g>
  <!-- Neural nodes on brain — colourful -->
  <g filter="url(#glow)">
    <circle cx="245" cy="195" r="10" fill="url(#a1)" opacity="0.9"/>
    <circle cx="355" cy="200" r="9" fill="url(#a2)" opacity="0.85"/>
    <circle cx="272" cy="255" r="11" fill="url(#a4)" opacity="0.8"/>
    <circle cx="330" cy="250" r="10" fill="url(#a3)" opacity="0.75"/>
    <circle cx="300" cy="170" r="8" fill="url(#a1)" opacity="0.85"/>
    <circle cx="260" cy="310" r="8" fill="url(#a2)" opacity="0.7"/>
    <circle cx="340" cy="305" r="8.5" fill="url(#a4)" opacity="0.7"/>
  </g>
  <!-- Inter-node connections -->
  <g stroke-width="2" fill="none" opacity="0.35">
    <line x1="245" y1="195" x2="300" y2="170" stroke="url(#a1)"/>
    <line x1="300" y1="170" x2="355" y2="200" stroke="url(#a2)"/>
    <line x1="355" y1="200" x2="330" y2="250" stroke="url(#a3)"/>
    <line x1="330" y1="250" x2="272" y2="255" stroke="url(#a4)"/>
    <line x1="272" y1="255" x2="245" y2="195" stroke="url(#a1)"/>
    <line x1="260" y1="310" x2="272" y2="255" stroke="url(#a2)"/>
    <line x1="340" y1="305" x2="330" y2="250" stroke="url(#a4)"/>
  </g>
  <!-- Synapse radiating outward -->
  <g stroke-width="1.5" fill="none" opacity="0.3">
    <line x1="245" y1="195" x2="120" y2="120" stroke="url(#a1)"/>
    <line x1="355" y1="200" x2="480" y2="115" stroke="url(#a2)"/>
    <line x1="260" y1="310" x2="110" y2="420" stroke="url(#a4)"/>
    <line x1="340" y1="305" x2="490" y2="410" stroke="url(#a3)"/>
    <line x1="300" y1="170" x2="300" y2="60" stroke="url(#a1)"/>
  </g>
  <!-- Outer colourful nodes -->
  <circle cx="120" cy="120" r="14" fill="url(#a1)" opacity="0.65" filter="url(#glow)"/>
  <circle cx="120" cy="120" r="6" fill="#fff" opacity="0.45"/>
  <circle cx="480" cy="115" r="14" fill="url(#a2)" opacity="0.6" filter="url(#glow)"/>
  <circle cx="480" cy="115" r="6" fill="#fff" opacity="0.4"/>
  <circle cx="110" cy="420" r="13" fill="url(#a4)" opacity="0.55" filter="url(#glow)"/>
  <circle cx="110" cy="420" r="6" fill="#fff" opacity="0.35"/>
  <circle cx="490" cy="410" r="13" fill="url(#a3)" opacity="0.55" filter="url(#glow)"/>
  <circle cx="490" cy="410" r="6" fill="#fff" opacity="0.35"/>
  <circle cx="300" cy="60" r="12" fill="url(#a1)" opacity="0.6" filter="url(#glow)"/>
  <circle cx="300" cy="60" r="5.5" fill="#fff" opacity="0.4"/>
  <!-- Lightning bolts -->
  <g filter="url(#glow3)">
    <polyline points="505,490 486,515 502,515 480,545" stroke="url(#a1)" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
    <polyline points="100,480 82,505 98,505 78,535" stroke="url(#a4)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
  </g>
  <!-- Orbiting rings -->
  <ellipse cx="300" cy="250" rx="185" ry="55" stroke="url(#a1)" stroke-width="1" fill="none" opacity="0.12" transform="rotate(-18,300,250)"/>
  <ellipse cx="300" cy="250" rx="205" ry="65" stroke="url(#a2)" stroke-width="0.8" fill="none" opacity="0.08" transform="rotate(12,300,250)"/>
  <!-- Sparkles -->
  <circle cx="70" cy="60" r="3" fill="#f59e0b" opacity="0.6"/>
  <circle cx="535" cy="55" r="2.5" fill="#06b6d4" opacity="0.5"/>
  <circle cx="550" cy="550" r="3" fill="#ec4899" opacity="0.5"/>
  <circle cx="55" cy="560" r="2.5" fill="#10b981" opacity="0.4"/>
  <circle cx="545" cy="300" r="2" fill="#f59e0b" opacity="0.4"/>
  <circle cx="55" cy="280" r="2" fill="#8b5cf6" opacity="0.35"/>
</svg>
